name: Bug report
labels:
  - state:needs-triage
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量填写可复现信息。后续澄清会在需要时通过 `## Triage Notes` 记录。
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: 现在实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: 你期望发生什么？
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: 如何复现？如果暂时无法复现，请说明观察到的条件。
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
